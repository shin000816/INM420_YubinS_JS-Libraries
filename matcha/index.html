<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- CSS REST -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@3.0.0/reset.min.css" />
        <!-- CSS -->
        <link rel="stylesheet" href="./CSS/style.css">

        <!-- font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">        
        
        <!-- glide css -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide@3.6.0/dist/css/glide.core.min.css">
        <!-- aos css -->
        <link  rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

        <!-- leaflet css -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

        <link rel="icon" href="data:,">

        <title>INM420 Assignment: JS Libraries</title>
    </head>

    <body>
        <header class="siteHeader">
            <div class="container navBar">
                <div class="logo">Travel</div>

                <nav class="nav">
                    <a href="#top">home</a>
                    <a href="#destinations">destinations</a>
                    <a href="#packages">packages</a>
                    <a href="#about">about</a>
                </nav>

                <div class="navRight">
                    <div class="controlsPanel">
                        <div class="controls">
                            <select id="countries" name="countries">
                                <option value="canada">Canada</option>
                                <option value="korea">Korea</option>
                                <option value="france">France</option>
                                <option value="mexico">Mexico</option>
                            </select>

                            <button id="btn" class="btnPrimary" type="button">view</button>
                        </div>

                        <p id="status" class="status" aria-live="polite"></p>
                    </div>
                </div>
            </div>

            <section class="container hero" id="top">
                <div class="heroMedia">
                    <div class="heroOverlay">
                        <h1>PLAN YOUR NEXT TRIP</h1>
                        <p>Choose a destination and explore photos, maps, and travel insights.</p>

                        <div class="heroActions">
                            <button class="btnLight" type="button">plan your trip</button>
                            <button class="btnGhost" type="button">explore destinations</button>
                        </div>
                    </div>
                </div>
            </section>
        </header>

        <main class="container" id="app"></main>
            
            
        <footer class="container footer">
            <p><strong>Libraries used (4):</strong> Leaflet.js, Chart.js, Glide.js, AOS</p>
        </footer>

        <!-- JS Libraries -->
        <script src="https://unpkg.com/@glidejs/glide@3.7.1/dist/glide.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>        
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

        <!-- JS -->
        <script src="./JS/script.js"></script>
    </body>
</html>
